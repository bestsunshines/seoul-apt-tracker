name: 월별 실거래가 데이터 업데이트

on:
  schedule:
    - cron: '0 15 1 * *'  # 매월 1일 00:00 KST (UTC 15:00)
  workflow_dispatch:        # GitHub Actions 탭에서 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: cd .github/scripts && npm install

      - name: MOLIT API 데이터 fetch
        run: cd .github/scripts && node fetch-molit.js
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "데이터 자동 업데이트: $(date +'%Y-%m')"
          git push
